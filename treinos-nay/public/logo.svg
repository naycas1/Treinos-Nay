<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C2318;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1710;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4A07A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background bege escuro -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Accent bar top-left -->
  <rect x="56" y="54" width="52" height="7" rx="3.5" fill="url(#accent)"/>

  <!-- N letter -->
  <g transform="translate(54, 155)">
    <rect x="0" y="0" width="32" height="165" rx="5" fill="#E8D5BC"/>
    <polygon points="32,0 70,165 32,165 0,0" fill="#E8D5BC"/>
    <rect x="70" y="0" width="32" height="165" rx="5" fill="#E8D5BC"/>
  </g>

  <!-- Dot separator — terracota que combina -->
  <circle cx="202" cy="258" r="11" fill="#A0522D"/>

  <!-- FIT -->
  <g transform="translate(222, 155)">
    <!-- F -->
    <rect x="0" y="0" width="30" height="165" rx="5" fill="#E8D5BC"/>
    <rect x="0" y="0" width="74" height="30" rx="5" fill="#E8D5BC"/>
    <rect x="0" y="68" width="58" height="26" rx="5" fill="#E8D5BC"/>
    <!-- I -->
    <rect x="92" y="0" width="30" height="165" rx="5" fill="#E8D5BC"/>
    <!-- T -->
    <rect x="122" y="0" width="116" height="30" rx="5" fill="#E8D5BC"/>
    <rect x="165" y="0" width="30" height="165" rx="5" fill="#E8D5BC"/>
  </g>

  <!-- Accent bar bottom-right -->
  <rect x="404" y="451" width="52" height="7" rx="3.5" fill="url(#accent)"/>

  <!-- Bottom label -->
  <text x="256" y="470" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#8B6914" text-anchor="middle" letter-spacing="7">TREINOS</text>
</svg>
